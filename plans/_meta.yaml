  - { id: M07, name: pos,               depends_on: [M01, M02, M05, M11] }
  - { id: M06, name: online-store,      depends_on: [M01, M02, M05, M11] }
  - { id: M08, name: sales-orders,      depends_on: [M01, M02, M05, M06, M07] }
  - { id: M09, name: crm,               depends_on: [M01, M02, M08] }
  - { id: M10, name: referral-wallet,   depends_on: [M02, M08, M09] }
  - { id: M14, name: delivery,          depends_on: [M01, M06, M08] }
