# =============================================================================
# AsliChoice — root pyproject.toml
# -----------------------------------------------------------------------------
# Tooling-only configuration for the monorepo (ruff, black, isort, pre-commit).
# The actual Python project lives in `backend/` and has its own pyproject /
# requirements files. This file is NOT a packageable Python project.
# =============================================================================

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
    \.venv
  | venv
  | build
  | dist
  | node_modules
  | staticfiles
  | media
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["config", "apps", "theme"]
skip = [".venv", "venv", "build", "dist", "node_modules", "staticfiles", "media"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    ".venv",
    "venv",
    "build",
    "dist",
    "node_modules",
    "staticfiles",
    "media",
    "migrations",
]

[tool.ruff.lint]
# Sensible default rule set; per-app overrides go in backend/pyproject.toml later.
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "C4",  # flake8-comprehensions
    "N",   # pep8-naming
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line length handled by black
    "S101",  # `assert` is fine in tests; pytest relies on it
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*.py" = ["B011"]
"**/tests/**/*.py" = ["S105", "S106", "S311"]
"**/test_*.py" = ["S105", "S106", "S311"]
# Django/Wagtail conventions: Page subclasses and DRF views use mutable
# class-level lists (content_panels, parent_page_types, http_method_names, etc.)
# by design; RUF005/RUF012 fight the framework, so silence them in app models
# and view layers.
"**/models.py" = ["RUF005", "RUF012"]
"**/views.py" = ["RUF005", "RUF012"]
# Development settings legitimately bind 0.0.0.0 for container/host access.
"**/settings/development.py" = ["S104"]

[tool.ruff.lint.isort]
# Mirror tool.isort.known_first_party so ruff and isort agree on grouping.
known-first-party = ["config", "apps", "theme"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.development"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
addopts = "-ra --strict-markers"
testpaths = ["storefront", "backend"]
