{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<article class="prose prose-slate max-w-none py-6">
    <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">{{ page.title }}</h1>
    {% if page.intro %}
        <p class="text-base text-slate-600 sm:text-lg">{{ page.intro }}</p>
    {% endif %}
    {% if page.body %}
        <div class="space-y-8">
            {% for block in page.body %}{% include_block block %}{% endfor %}
        </div>
    {% endif %}
</article>
{% endblock %}
