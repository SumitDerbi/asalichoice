{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<section class="space-y-4 py-6">
    <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">{{ page.title }}</h1>
    {% if page.intro %}
        <div class="prose prose-slate max-w-prose">{{ page.intro|richtext }}</div>
    {% endif %}
    <p class="rounded-xl border border-dashed border-slate-300 bg-white p-6 text-sm text-slate-500">
        Blog posts will appear here once the content module ships.
    </p>
</section>
{% endblock %}
