[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
# Coverage is configured here but the --cov flags are NOT in the default
# addopts so plain `pytest` stays fast for local TDD. Use `pytest --cov` or
# `make test-backend` (see scripts/test-all.*) to run with the gate.
addopts = -ra --strict-markers --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests touching multiple modules
    e2e: end-to-end tests (skipped in unit runs)
